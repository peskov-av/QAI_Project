name: AI-Driven QA Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      checklist:
        description: 'Path to checklist'
        required: false
        default: 'test_data/checklists/sample_checklist.json'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # ВАЖНО: Устанавливаем из requirements.txt
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Дополнительно устанавливаем пакеты для линтинга, если их нет в requirements.txt
        pip install flake8 pylint allure-pytest

    - name: Run AI-Driven QA Pipeline
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        python -m qa_pipeline.pipeline

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qa-pipeline-artifacts
        path: reports/

    - name: Install Allure CLI
      if: always()
      run: |
        # Проблема: sudo apt-get install allure устанавливает НЕПРАВИЛЬНЫЙ пакет
        # Используем официальную установку
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
        tar -zxvf allure-2.29.0.tgz
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
        allure --version

    - name: Generate Allure Report
      if: always()
      run: |
        # Проверяем, существуют ли результаты тестов
        if [ -d "reports/allure-results" ] && [ "$(ls -A reports/allure-results)" ]; then
          allure generate reports/allure-results -o reports/allure-report --clean
          echo "Allure report generated successfully"
        else
          echo "No allure-results found, skipping report generation"
        fi

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: reports/allure-report