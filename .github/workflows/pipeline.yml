name: AI-Driven QA Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      checklist:
        description: 'Path to checklist'
        required: false
        default: 'test_data/checklists/sample_checklist.json'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai pytest allure-pytest flake8 pylint

    - name: Run AI-Driven QA Pipeline
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        python -m qa_pipeline.pipeline

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qa-pipeline-artifacts
        path: reports/

    - name: Generate Allure Report
      if: always()
      run: |
        # Инсталяция allure commandline (пример для ubuntu)
        sudo apt-get update && sudo apt-get install -y allure
        allure generate reports/allure-results -o reports/allure-report --clean

    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: reports/allure-report
